<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ลงเวลาเข้า-ออกงาน</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<style>
  :root {
    --teal: #12967F;
    --teal-dark: #0C7A67;
    --teal-soft: #E3F3EF;
    --ink: #172321;
    --ink-soft: #64756F;
    --surface: #FFFFFF;
    --surface-sunk: #F3F7F6;
    --line: #E7EEEC;
    --danger: #E2574C;
    --danger-soft: #FDEBE9;
    --ok: #2F8F5B;
    --ok-soft: #E4F3EA;
    --warn: #D98A2B;
    --warn-soft: #FBEEDD;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Noto Sans Thai', 'Sarabun', -apple-system, 'Segoe UI', Tahoma, sans-serif;
    margin: 0;
    background: linear-gradient(180deg, var(--teal) 0%, var(--teal-dark) 100%);
    color: var(--ink);
    line-height: 1.5;
    min-height: 100vh;
    padding: 22px 14px 40px;
  }
  .app-shell {
    max-width: 440px;
    margin: 0 auto;
    background: var(--surface);
    border-radius: 26px;
    box-shadow: 0 20px 44px -20px rgba(0,0,0,0.35);
    padding: 22px 20px 26px;
  }
  .app-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .app-brand { display: flex; align-items: center; gap: 8px; }
  .app-brand .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--teal); }
  .app-brand span { font-weight: 800; font-size: 15px; letter-spacing: -0.01em; }
  .app-topbar .subtitle-small { font-size: 11.5px; color: var(--ink-soft); }

  h1 { font-size: 21px; font-weight: 800; margin: 14px 0 2px; letter-spacing: -0.01em; }
  .subtitle { font-size: 12.5px; color: var(--ink-soft); margin: 0 0 18px; }
  h2 { font-size: 13px; font-weight: 800; letter-spacing: 0.03em; margin: 22px 0 10px; color: var(--ink-soft); text-transform: uppercase; }

  label { display: block; font-size: 12.5px; font-weight: 700; margin-bottom: 6px; color: var(--ink-soft); }
  select, input[type="text"] {
    width: 100%;
    padding: 12px 14px;
    font-size: 14px;
    border: 1.5px solid var(--line);
    border-radius: 12px;
    background: var(--surface-sunk);
    color: var(--ink);
    margin-bottom: 12px;
    font-family: inherit;
  }
  select:focus, input:focus { outline: none; border-color: var(--teal); background: var(--surface); }

  /* today card */
  .today-card {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--teal-soft);
    border-radius: 16px;
    padding: 13px 15px;
    margin-bottom: 16px;
  }
  .today-card .icon-badge {
    width: 38px; height: 38px; border-radius: 12px; background: var(--teal);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .today-card .icon-badge svg { width: 19px; height: 19px; color: #fff; }
  .today-card .lines .l1 { font-weight: 800; font-size: 13.5px; }
  .today-card .lines .l2 { font-size: 11.5px; color: var(--ink-soft); font-variant-numeric: tabular-nums; }

  .card {
    padding: 13px 15px;
    border-radius: 14px;
    background: var(--surface-sunk);
    margin-bottom: 14px;
  }
  #employeeInfoCard { display: none; }
  #employeeInfoName { font-weight: 800; font-size: 14.5px; }
  #employeeInfoMeta { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }

  .hint { font-size: 11.5px; color: var(--ink-soft); margin: -6px 0 14px; }

  /* buttons */
  .btn-row { display: flex; gap: 10px; margin-bottom: 6px; }
  button {
    padding: 15px 10px;
    font-size: 14.5px;
    font-weight: 800;
    border-radius: 16px;
    cursor: pointer;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  button:active { transform: translateY(1px); }
  button svg { width: 18px; height: 18px; flex-shrink: 0; }

  .btn-in { flex: 1; background: var(--teal); color: #fff; border: 1.5px solid var(--teal); }
  .btn-out { flex: 1; background: #fff; color: var(--teal); border: 1.5px solid var(--teal); }
  .btn-block { width: 100%; margin-bottom: 10px; }
  .btn-secondary { background: var(--surface-sunk); color: var(--ink); border: 1.5px solid var(--line); }
  .btn-confirm { background: var(--danger); color: #fff; border: 1.5px solid var(--danger); }

  #clockOutSection { display: none; border-top: 1px dashed var(--line); margin-top: 20px; padding-top: 6px; }

  .task-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
    align-items: center;
    background: var(--surface-sunk);
    border-radius: 14px;
    padding: 11px;
  }
  .task-row input[type="text"] {
    flex: 1 1 120px;
    min-width: 100px;
    margin-bottom: 0;
    padding: 8px 10px;
    font-size: 13px;
    background: var(--surface);
  }
  .task-row select {
    margin-bottom: 0;
    padding: 8px 10px;
    font-size: 13px;
    width: auto;
    background: var(--surface);
  }
  .taskStatus { min-width: 120px; }
  .taskRecurring { min-width: 90px; }
  .removeTaskBtn {
    flex: 0 0 auto;
    padding: 7px 11px;
    font-size: 12px;
    background: var(--danger-soft);
    color: var(--danger);
    border: none;
    border-radius: 10px;
  }

  #status {
    display: none;
    margin-top: 16px;
    padding: 13px 15px;
    border-radius: 14px;
    font-size: 13px;
    font-weight: 700;
  }
  #status.success { display: block; background: var(--ok-soft); color: var(--ok); }
  #status.error { display: block; background: var(--danger-soft); color: var(--danger); }

  hr { border: none; border-top: 1px dashed var(--line); margin: 26px 0 18px; }
</style>
</head>
<body>

<div class="app-shell">

  <div class="app-topbar">
    <div class="app-brand"><span class="dot"></span><span>hr-system</span></div>
    <div class="subtitle-small" id="todayLabelSmall"></div>
  </div>

  <h1>ลงเวลาเข้า-ออกงาน</h1>
  <p class="subtitle" id="todayLabel"></p>

  <label for="employeeSelect">เลือกชื่อของคุณ</label>
  <select id="employeeSelect">
    <option value="">-- เลือกชื่อ --</option>
  </select>

  <div id="employeeInfoCard" class="card">
    <div id="employeeInfoName"></div>
    <div id="employeeInfoMeta"></div>
  </div>

  <div class="today-card">
    <div class="icon-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="3"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    </div>
    <div class="lines">
      <div class="l1" id="todayLabelCard"></div>
      <div class="l2" id="nowClock"></div>
    </div>
  </div>

  <label for="locationNote">สถานที่ (กรอกเฉพาะกรณีไม่ได้อยู่ที่ออฟฟิศ/ไม่ได้อยู่บ้าน)</label>
  <input type="text" id="locationNote" placeholder="เช่น ไปประชุมลูกค้า, ร้านกาแฟ ABC">
  <p class="hint">ถ้าอยู่ที่ออฟฟิศ หรือทำงานที่บ้านตามปกติ ไม่ต้องกรอกช่องนี้</p>

  <div class="btn-row">
    <button id="clockInBtn" class="btn-in">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 17l5-5-5-5"/><path d="M15 12H3"/><path d="M21 19V5a2 2 0 0 0-2-2h-6"/></svg>
      บันทึกเข้า
    </button>
    <button id="showClockOutBtn" class="btn-out">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 17l-5-5 5-5"/><path d="M9 12h12"/><path d="M3 19V5a2 2 0 0 1 2-2h6"/></svg>
      บันทึกออก
    </button>
  </div>

  <div id="clockOutSection">
    <h2>รายการงานที่ทำวันนี้</h2>
    <div id="taskList"></div>
    <button id="addTaskBtn" class="btn-secondary btn-block" type="button">+ เพิ่มรายการงาน</button>
    <button id="confirmClockOutBtn" class="btn-confirm btn-block" type="button">ยืนยันออกงาน</button>
  </div>

  <hr>

  <h1 style="font-size:18px;">ยื่นใบลา</h1>
  <label>ประเภทลา:</label>
  <select id="leaveType">
    <option value="ลากิจ">ลากิจ</option>
    <option value="ลาป่วย">ลาป่วย</option>
    <option value="ลาพักร้อน">ลาพักร้อน</option>
  </select>

  <label>วันที่เริ่มลา:</label>
  <input type="text" id="leaveStartDate" placeholder="วว/ดด/ปปปป" readonly>

  <label>วันที่สิ้นสุดลา:</label>
  <input type="text" id="leaveEndDate" placeholder="วว/ดด/ปปปป" readonly>

  <button id="submitLeaveBtn" class="btn-secondary btn-block" type="button">ยื่นใบลา</button>

  <div id="status"></div>

</div>

<script>
  var API_URL = 'https://script.google.com/macros/s/AKfycbzZuv9MOZvgdTadHmXFTuVmDE6zPVW6zUvwu7gxmfqrYQLjUo20iDuwqe5HgEjJMYjd/exec';

  var THAI_DAYS = ['วันอาทิตย์', 'วันจันทร์', 'วันอังคาร', 'วันพุธ', 'วันพฤหัสบดี', 'วันศุกร์', 'วันเสาร์'];
  var THAI_MONTHS = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน', 'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];

  function pad2(n) { return n < 10 ? '0' + n : String(n); }

  function renderToday() {
    var d = new Date();
    var label = THAI_DAYS[d.getDay()] + ' ที่ ' + d.getDate() + ' ' + THAI_MONTHS[d.getMonth()] + ' ' + (d.getFullYear() + 543);
    var timeLabel = pad2(d.getHours()) + ':' + pad2(d.getMinutes()) + ':' + pad2(d.getSeconds());
    document.getElementById('todayLabel').textContent = label;
    document.getElementById('todayLabelCard').textContent = label;
    document.getElementById('todayLabelSmall').textContent = timeLabel;
    document.getElementById('nowClock').textContent = 'เวลาปัจจุบัน ' + timeLabel + ' น.';
  }
  renderToday();
  setInterval(renderToday, 1000);

  function apiCall(action, params) {
    params = params || {};
    var pairs = ['action=' + encodeURIComponent(action)];
    Object.keys(params).forEach(function (key) {
      var value = params[key];
      if (typeof value === 'object') value = JSON.stringify(value);
      pairs.push(encodeURIComponent(key) + '=' + encodeURIComponent(value));
    });
    return fetch(API_URL + '?' + pairs.join('&')).then(function (res) { return res.json(); });
  }

  function showStatus(message, isError) {
    var el = document.getElementById('status');
    el.textContent = message;
    el.className = isError ? 'error' : 'success';
  }

  function getSelectedEmployeeId() {
    var id = document.getElementById('employeeSelect').value;
    if (!id) {
      showStatus('กรุณาเลือกชื่อของคุณก่อน', true);
    }
    return id;
  }

  function withLocation(callback) {
    if (!navigator.geolocation) {
      showStatus('เบราว์เซอร์นี้ไม่รองรับการระบุตำแหน่ง', true);
      return;
    }
    showStatus('กำลังขอตำแหน่ง...', false);
    navigator.geolocation.getCurrentPosition(
      function (pos) {
        callback(pos.coords.latitude, pos.coords.longitude);
      },
      function () {
        showStatus('ไม่สามารถเข้าถึงตำแหน่งได้ กรุณาอนุญาตการเข้าถึงตำแหน่ง', true);
      }
    );
  }

  function loadEmployees() {
    apiCall('getActiveEmployeesForDropdown').then(function (res) {
      if (!res.success) { showStatus('โหลดรายชื่อไม่สำเร็จ: ' + res.error, true); return; }
      var select = document.getElementById('employeeSelect');
      res.data.forEach(function (emp) {
        var option = document.createElement('option');
        option.value = emp.employeeId;
        option.textContent = emp.nickname;
        select.appendChild(option);
      });
      var savedId = localStorage.getItem('hr_selected_employee');
      if (savedId) {
        select.value = savedId;
        showEmployeeInfo(savedId);
      }
    }).catch(function (err) {
      showStatus('เชื่อมต่อ API ไม่สำเร็จ: ' + err.message, true);
    });
  }

  function showEmployeeInfo(employeeId) {
    var card = document.getElementById('employeeInfoCard');
    if (!employeeId) {
      card.style.display = 'none';
      return;
    }
    apiCall('getEmployeeInfo', { employeeId: employeeId }).then(function (res) {
      if (!res.success || !res.data) { card.style.display = 'none'; return; }
      document.getElementById('employeeInfoName').textContent = res.data.name;
      document.getElementById('employeeInfoMeta').textContent = res.data.position + ' · ' + res.data.department;
      card.style.display = 'block';
    });
  }

  document.getElementById('employeeSelect').addEventListener('change', function (e) {
    localStorage.setItem('hr_selected_employee', e.target.value);
    showEmployeeInfo(e.target.value);
  });

  document.getElementById('clockInBtn').addEventListener('click', function () {
    var employeeId = getSelectedEmployeeId();
    if (!employeeId) return;
    var locationNote = document.getElementById('locationNote').value.trim();
    withLocation(function (lat, lng) {
      showStatus('กำลังบันทึกเข้างาน...', false);
      apiCall('clockIn', { employeeId: employeeId, lat: lat, lng: lng, locationNote: locationNote }).then(function (res) {
        if (!res.success) { showStatus('เกิดข้อผิดพลาด: ' + res.error, true); return; }
        var msg = 'บันทึกเข้างานสำเร็จ';
        if (res.data.isLate) msg += ' (มาสาย)';
        if (res.data.anomaly) msg += ' — ' + res.data.anomaly;
        showStatus(msg, false);
      }).catch(function (err) { showStatus('เกิดข้อผิดพลาด: ' + err.message, true); });
    });
  });

  document.getElementById('showClockOutBtn').addEventListener('click', function () {
    var employeeId = getSelectedEmployeeId();
    if (!employeeId) return;
    document.getElementById('clockOutSection').style.display = 'block';
    if (document.getElementById('taskList').children.length === 0) {
      var dailyTasks = getDailyTasks(employeeId);
      if (dailyTasks.length > 0) {
        dailyTasks.forEach(function (name) { addTaskRow(name, 'Daily'); });
      } else {
        addTaskRow();
      }
    }
  });

  function getDailyTasks(employeeId) {
    var raw = localStorage.getItem('hr_daily_tasks_' + employeeId);
    return raw ? JSON.parse(raw) : [];
  }

  function saveDailyTasks(employeeId, names) {
    localStorage.setItem('hr_daily_tasks_' + employeeId, JSON.stringify(names));
  }

  function addTaskRow(prefillName, prefillRecurring) {
    var taskList = document.getElementById('taskList');
    var row = document.createElement('div');
    row.className = 'task-row';
    row.innerHTML =
      '<input type="text" placeholder="ชื่องาน" class="taskName">' +
      '<select class="taskStatus">' +
      '<option value="complete">complete</option>' +
      '<option value="in progress">in progress</option>' +
      '</select>' +
      '<select class="taskRecurring">' +
      '<option value="General">General</option>' +
      '<option value="Daily">Daily</option>' +
      '<option value="Weekly">Weekly</option>' +
      '<option value="Monthly">Monthly</option>' +
      '</select>' +
      '<input type="text" placeholder="ลิงก์งาน (ถ้ามี)" class="taskLink">' +
      '<input type="text" placeholder="หมายเหตุ (ถ้ามี)" class="taskNote">' +
      '<button type="button" class="removeTaskBtn">ลบ</button>';
    if (prefillName) { row.querySelector('.taskName').value = prefillName; }
    if (prefillRecurring) { row.querySelector('.taskRecurring').value = prefillRecurring; }
    row.querySelector('.removeTaskBtn').addEventListener('click', function () { row.remove(); });
    taskList.appendChild(row);
  }

  document.getElementById('addTaskBtn').addEventListener('click', function () { addTaskRow(); });

  document.getElementById('confirmClockOutBtn').addEventListener('click', function () {
    var employeeId = getSelectedEmployeeId();
    if (!employeeId) return;

    var tasks = [];
    document.querySelectorAll('.task-row').forEach(function (row) {
      var name = row.querySelector('.taskName').value.trim();
      var status = row.querySelector('.taskStatus').value;
      var recurring = row.querySelector('.taskRecurring').value;
      var link = row.querySelector('.taskLink').value.trim();
      var note = row.querySelector('.taskNote').value.trim();
      if (name) {
        tasks.push({ name: name, status: status, recurring: recurring, link: link, note: note });
      }
    });

    if (tasks.length === 0) {
      showStatus('กรุณากรอกรายการงานอย่างน้อย 1 รายการ', true);
      return;
    }

    var dailyNames = tasks.filter(function (t) { return t.recurring === 'Daily'; })
      .map(function (t) { return t.name; });
    saveDailyTasks(employeeId, dailyNames);

    var locationNote = document.getElementById('locationNote').value.trim();

    withLocation(function (lat, lng) {
      showStatus('กำลังบันทึกออกงาน...', false);
      apiCall('clockOut', { employeeId: employeeId, lat: lat, lng: lng, tasks: tasks, locationNote: locationNote }).then(function (res) {
        if (!res.success) { showStatus('เกิดข้อผิดพลาด: ' + res.error, true); return; }
        var msg = 'บันทึกออกงานสำเร็จ';
        if (res.data.anomaly) msg += ' — ' + res.data.anomaly;
        showStatus(msg, false);
      }).catch(function (err) { showStatus('เกิดข้อผิดพลาด: ' + err.message, true); });
    });
  });

  document.getElementById('submitLeaveBtn').addEventListener('click', function () {
    var employeeId = getSelectedEmployeeId();
    if (!employeeId) return;
    var leaveType = document.getElementById('leaveType').value;
    var startDate = document.getElementById('leaveStartDate').value;
    var endDate = document.getElementById('leaveEndDate').value;

    if (!startDate || !endDate) {
      showStatus('กรุณาเลือกวันที่ลาให้ครบ', true);
      return;
    }

    showStatus('กำลังบันทึกใบลา...', false);
    apiCall('submitLeaveRequest', { employeeId: employeeId, leaveType: leaveType, startDate: startDate, endDate: endDate }).then(function (res) {
      if (!res.success) { showStatus('เกิดข้อผิดพลาด: ' + res.error, true); return; }
      showStatus('ยื่นใบลาสำเร็จ (สถานะ: ' + res.data.status + ')', false);
    }).catch(function (err) { showStatus('เกิดข้อผิดพลาด: ' + err.message, true); });
  });

  flatpickr('#leaveStartDate', { dateFormat: 'Y-m-d', altInput: true, altFormat: 'd/m/Y', static: true });
  flatpickr('#leaveEndDate', { dateFormat: 'Y-m-d', altInput: true, altFormat: 'd/m/Y', static: true });

  loadEmployees();
</script>

</body>
</html>
